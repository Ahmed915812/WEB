<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="project.css">
    <title>Vision Scout</title>
    <style>
        /* Small style addition for the chatbot UI */
        #chat-widget { position: fixed; bottom: 20px; right: 20px; font-family: Arial, sans-serif; z-index: 1000; }
        #chat-window { width: 300px; height: 400px; background: white; border: 1px solid #ccc; border-radius: 10px; display: none; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #messages { flex: 1; padding: 10px; overflow-y: auto; font-size: 14px; }
        .bot-msg { color: #555; background: #f0f0f0; padding: 5px; margin: 5px 0; border-radius: 5px; }
        .user-msg { color: white; background: #007bff; padding: 5px; margin: 5px 0; border-radius: 5px; text-align: right; }
        #chat-input-area { display: flex; border-top: 1px solid #eee; }
        #chat-input-area input { flex: 1; border: none; padding: 10px; outline: none; }
        #chat-toggle { background: #007bff; color: white; border: none; padding: 15px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="logo-container">
            <img src="logo.png" alt="Vision Scout Logo" class="logo">
        </div>
        
        <div class="buttons-row">
            <div class="ellipse" id="toggleBtn">Register</div>
        </div>

        <div class="content-area">
            <div id="loginForm" class="form-container active">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
                <form>
                    <input type="email" placeholder="Email Address" class="input-field">
                    <input type="password" placeholder="Password" class="input-field">
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>
            </div>
            
            <div id="registerForm" class="form-container">
                <h2>Register</h2>
                <p>Create a new account</p>
                <form>
                    <input type="text" placeholder="Full Name" class="input-field">
                    <input type="email" placeholder="Email Address" class="input-field">
                    <input type="password" placeholder="Password" class="input-field">
                    <input type="password" placeholder="Confirm Password" class="input-field">
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

    <div id="chat-widget">
        <div id="chat-window">
            <div id="messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chatInput" placeholder="Ask in any language...">
                <button onclick="handleChat()">Send</button>
            </div>
        </div>
        <button id="chat-toggle" onclick="toggleChat()">💬</button>
    </div>

    <script>
        /* Existing Login/Register Logic */
        const toggleBtn = document.getElementById('toggleBtn');
        const loginForm = document.getElementById('loginForm');
        const regForm = document.getElementById('registerForm');
        let isRegisterMode = false;

        toggleBtn.addEventListener('click', () => {
            isRegisterMode = !isRegisterMode;
            if (isRegisterMode) {
                toggleBtn.textContent = 'Sign In';
                regForm.classList.add('active');
                loginForm.classList.remove('active');
            } else {
                toggleBtn.textContent = 'Register';
                loginForm.classList.add('active');
                regForm.classList.remove('active');
            }
        });

        /* --- CHATBOT & TRANSLATION LOGIC --- */
        function toggleChat() {
            const win = document.getElementById('chat-window');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        async function handleChat() {
            const input = document.getElementById('chatInput');
            const messageArea = document.getElementById('messages');
            const text = input.value;
            if(!text) return;

            // Display user message
            messageArea.innerHTML += `<div class="user-msg">${text}</div>`;
            input.value = '';

            // AI TRANSLATION LOGIC
            // Using a free public API for translation (MyMemory API)
            try {
                const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=auto|en`);
                const data = await response.json();
                const translatedText = data.responseData.translatedText;

                // Simple Bot Response based on translated text
                let botReply = `I understood that as: "${translatedText}". How can I help with Vision Scout?`;
                
                messageArea.innerHTML += `<div class="bot-msg">${botReply}</div>`;
            } catch (error) {
                messageArea.innerHTML += `<div class="bot-msg">Sorry, I had trouble translating that.</div>`;
            }
            
            messageArea.scrollTop = messageArea.scrollHeight;
        }

        // Redirect form submissions
        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                window.location.href = 'home.html';
            });
        });
    </script>
</body> 
</html>
