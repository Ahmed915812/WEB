<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="project.css">
   
    <title>Vision Scout</title>
</head>
<body>
    <div class="main-container" id="mainContainer">
        <div class="logo-container">
            <img src="logo.png" alt="Vision Scout Logo" class="logo">
        </div>
        
        <div class="buttons-row">
            <div class="ellipse" id="toggleBtn">Register</div>
        </div>

        <div class="content-area">
            <div id="loginForm" class="form-container active">
                <h2>Welcome Back</h2>
                <p>Sign in to your account</p>
                <form>
                    <input type="email" placeholder="Email Address" class="input-field">
                    <input type="password" placeholder="Password" class="input-field">
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>
            </div>
            
            <div id="registerForm" class="form-container">
                <h2>Register</h2>
                <p>Create a new account</p>
                <form>
                    <input type="text" placeholder="Full Name" class="input-field">
                    <input type="email" placeholder="Email Address" class="input-field">
                    <input type="password" placeholder="Password" class="input-field">
                    <input type="password" placeholder="Confirm Password" class="input-field">
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>

<script src="project.js">
         const toggleBtn = document.getElementById('toggleBtn');
        const loginForm = document.getElementById('loginForm');
        const regForm = document.getElementById('registerForm');
        let isRegisterMode = false;

        toggleBtn.addEventListener('click', () => {
            isRegisterMode = !isRegisterMode;
            
            if (isRegisterMode) {
                // Switch to Register
                toggleBtn.textContent = 'Sign In';
                toggleBtn.classList.add('moved');
                regForm.classList.add('active');
                loginForm.classList.remove('active');
            } else {
                // Switch to Login
                toggleBtn.textContent = 'Register';
                toggleBtn.classList.remove('moved');
                loginForm.classList.add('active');
                regForm.classList.remove('active');
            }
        });

        // Handle form submissions - redirect to home page
        const allForms = document.querySelectorAll('form');
        allForms.forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                window.location.href = 'home.html';
                 <link rel="ai" href="project.js">
    
            });
        });
    </script>
</body>
</html>
